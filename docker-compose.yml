
services:

  traefik:
    image: traefik:2.10
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    networks:
      - intranet
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  backend:
    build:
      context: ./intranet_axioma
      dockerfile: Dockerfile
    container_name: intranet-backend
    networks:
      - intranet
    ports:
    - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/intranet_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - database
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.intranet.local`)"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: intranet-frontend
    ports:
    - "3000:3000"
    networks:
      - intranet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`intranet.local`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  database:
    image: postgres:15
    container_name: intranet-db
    restart: unless-stopped
    networks:
      - intranet
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: intranet_db
    ports:
      - 5432:5432
    volumes:
      - ./data/database:/var/lib/postgresql/data

networks:
  intranet:
    driver: bridge
